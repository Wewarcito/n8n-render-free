databases:
  - name: n8n-db
    plan: free

services:
  - type: web
    name: n8n-server
    env: docker
    plan: free
    repo: https://github.com/n8n-io/n8n
    branch: master
    dockerfilePath: docker/images/n8n/Dockerfile
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: WEBHOOK_URL
        value: https://n8n-server.onrender.com/
      - key: N8N_HOST
        value: n8n-server.onrender.com
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
